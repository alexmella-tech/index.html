<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>XOR-kryptering – Battleship-demo</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 1rem;
        background: #0f0f0f;
        color: #e0e0e0;
    }
    h1 { color: #00ff9d; }
    select, input, button {
        width: 100%;
        padding: 0.6rem;
        margin-top: 0.4rem;
        font-size: 1rem;
        border-radius: 6px;
        border: none;
    }
    button {
        background: #00ff9d;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        margin-top: 1rem;
    }
    .bitbox {
        display: flex;
        gap: 6px;
        margin-top: 1rem;
        font-family: monospace;
        font-size: 1.3rem;
    }
    .bit {
        width: 28px;
        height: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 4px;
        background: #1f1f1f;
        border: 1px solid #333;
        transition: background 0.3s;
    }
    .bit.flash {
        background: #00ff9d;
        color: #000;
    }
</style>
</head>
<body>

<h1>XOR-kryptering – Demo</h1>
<p>Velg koordinat og nøkkel for å se hvordan XOR-kryptering fungerer i spillet.</p>

<label>Koordinat (A1–H8):</label>
<select id="coordSelect"></select>

<label>Krypteringsnøkkel (1–8):</label>
<select id="keySelect">
    <option value="101010">1 – 101010</option> <!-- Nøkkelnummer 000, desimal 1 -->
    <option value="011001">2 – 011001</option> <!-- Nøkkelnummer 001, desimal 2 -->
    <option value="110100">3 – 110100</option> <!-- Nøkkelnummer 010, desimal 3 -->
    <option value="000111">4 – 000111</option> <!-- Nøkkelnummer 011, desimal 4 -->
    <option value="111000">5 – 111000</option> <!-- Nøkkelnummer 100, desimal 5 -->
    <option value="010101">6 – 010101</option> <!-- Nøkkelnummer 101, desimal 6 -->
    <option value="100110">7 – 100110</option> <!-- Nøkkelnummer 110, desimal 7 -->
    <option value="001011">8 – 001011</option> <!-- Nøkkelnummer 111, desimal 8 -->
</select>

<button onclick="runXor()">Krypter</button>

<h2>Bit-for-bit XOR</h2>
<div id="bitA" class="bitbox"></div>
<div id="bitB" class="bitbox"></div>
<div id="bitR" class="bitbox"></div>

<script>
    // Generer koordinater A1–H8
    const coordSelect = document.getElementById("coordSelect");
    const letters = "ABCDEFGH";
    for (let l of letters) {
        for (let n = 1; n <= 8; n++) {
            const bin = (letters.indexOf(l) << 3 | (n - 1)).toString(2).padStart(6, "0");
            coordSelect.innerHTML += `<option value="${bin}">${l}${n} (${bin})</option>`;
        }
    }

    function renderBits(container, bits) {
        container.innerHTML = "";
        for (let b of bits) {
            const div = document.createElement("div");
            div.className = "bit";
            div.textContent = b;
            container.appendChild(div);
        }
    }

    function flashBits(bits) {
        bits.forEach((bit, i) => {
            setTimeout(() => bit.classList.add("flash"), i * 150);
            setTimeout(() => bit.classList.remove("flash"), i * 150 + 300);
        });
    }

    function runXor() {
        const coord = coordSelect.value;
        const key = document.getElementById("keySelect").value;

        const result = [...coord].map((c, i) => (parseInt(c) ^ parseInt(key[i]))).join("");

        renderBits(document.getElementById("bitA"), coord);
        renderBits(document.getElementById("bitB"), key);
        renderBits(document.getElementById("bitR"), result);

        flashBits([...document.querySelectorAll("#bitR .bit")]);
    }
</script>

</body>
</html>
